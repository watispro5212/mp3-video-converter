<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Media Converter</title>
    <style>
        :root { --primary: #2563eb; --success: #10b981; --bg: #f8fafc; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); display: flex; justify-content: center; padding: 20px; }
        .card { background: white; padding: 2rem; border-radius: 16px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); width: 100%; max-width: 500px; }
        h1 { margin-top: 0; font-size: 1.5rem; color: #1e293b; }
        .input-group { margin-bottom: 1.5rem; text-align: left; }
        label { display: block; margin-bottom: 0.5rem; font-weight: 600; color: #475569; }
        input, select { width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 8px; box-sizing: border-box; }
        .progress-container { height: 12px; background: #e2e8f0; border-radius: 6px; margin: 20px 0; overflow: hidden; display: none; }
        #progressBar { height: 100%; width: 0%; background: var(--primary); transition: width 0.3s; }
        button { width: 100%; background: var(--primary); color: white; border: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        button:disabled { background: #94a3b8; cursor: not-allowed; }
        #status { font-size: 0.85rem; color: #64748b; margin-top: 10px; }
        .result { margin-top: 20px; padding: 15px; border: 1px solid #e2e8f0; border-radius: 8px; display: none; }
        .download-btn { display: block; margin-top: 10px; background: var(--success); text-align: center; text-decoration: none; color: white; padding: 10px; border-radius: 8px; font-weight: bold; }
    </style>
</head>
<body>

<div class="card">
    <h1>Media Converter</h1>
    
    <div class="input-group">
        <label>1. Select File or Enter URL</label>
        <input type="file" id="fileInput" accept="video/*,audio/*">
        <p style="text-align: center; margin: 10px 0; color: #94a3b8;">- OR -</p>
        <input type="text" id="urlInput" placeholder="https://example.com/video.mp4">
    </div>

    <div class="input-group">
        <label>2. Output Format</label>
        <select id="formatSelect">
            <option value="mp3">MP3 (High Quality Audio)</option>
            <option value="wav">WAV (Lossless Audio)</option>
            <option value="aac">AAC (Modern Audio)</option>
            <option value="ogg">OGG (Vorbis)</option>
        </select>
    </div>

    <button id="startBtn" disabled>Loading Engine...</button>

    <div class="progress-container" id="progCont"><div id="progressBar"></div></div>
    <div id="status">Ready.</div>

    <div class="result" id="resultArea">
        <audio id="audioPreview" controls style="width:100%"></audio>
        <a id="dlLink" class="download-btn">Download Result</a>
    </div>
</div>

<script type="module">
    import { FFmpeg } from 'https://unpkg.com/@ffmpeg/ffmpeg@0.12.10/dist/esm/index.js';
    import { fetchFile } from 'https://unpkg.com/@ffmpeg/util@0.12.1/dist/esm/index.js';

    const ffmpeg = new FFmpeg();
    const el = (id) => document.getElementById(id);

    // Bypasses COOP/COEP headers for GitHub Pages
    const toBlobURL = async (url, type) => {
        const res = await fetch(url);
        return URL.createObjectURL(new Blob([await res.blob()], { type }));
    };

    async function init() {
        const corePath = 'https://unpkg.com/@ffmpeg/core@0.12.6/dist/esm';
        await ffmpeg.load({
            coreURL: await toBlobURL(`${corePath}/ffmpeg-core.js`, 'text/javascript'),
            wasmURL: await toBlobURL(`${corePath}/ffmpeg-core.wasm`, 'application/wasm'),
        });
        el('startBtn').innerText = 'Convert Now';
        el('startBtn').disabled = false;
    }

    ffmpeg.on('progress', ({ progress }) => {
        el('progCont').style.display = 'block';
        el('progressBar').style.width = `${progress * 100}%`;
        el('status').innerText = `Converting: ${Math.round(progress * 100)}%`;
    });

    el('startBtn').onclick = async () => {
        const file = el('fileInput').files[0];
        const url = el('urlInput').value;
        const format = el('formatSelect').value;
        
        if (!file && !url) return alert("Please provide a file or a URL!");

        el('startBtn').disabled = true;
        el('resultArea').style.display = 'none';
        el('progressBar').style.width = '0%';

        try {
            const inputData = file ? await fetchFile(file) : await fetchFile(url);
            const inputName = 'input_file';
            const outputName = `output.${format}`;

            await ffmpeg.writeFile(inputName, inputData);
            
            // Execute conversion
            // -i: input, -vn: no video, -q:a 0: variable bitrate high quality
            await ffmpeg.exec(['-i', inputName, '-vn', '-q:a', '0', outputName]);

            const data = await ffmpeg.readFile(outputName);
            const blob = new Blob([data.buffer], { type: `audio/${format}` });
            const finalUrl = URL.createObjectURL(blob);

            el('audioPreview').src = finalUrl;
            el('dlLink').href = finalUrl;
            el('dlLink').download = `converted_audio.${format}`;
            el('resultArea').style.display = 'block';
            el('status').innerText = 'Conversion Complete!';
        } catch (e) {
            console.error(e);
            el('status').innerText = "Error: " + e.message;
        } finally {
            el('startBtn').disabled = false;
        }
    };

    init();
</script>
</body>
</html>
